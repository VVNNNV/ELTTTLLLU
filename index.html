<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PicUntu – 智能批量图片压缩工具 | 支持 JPEG PNG WEBP AVIF SVG GIF</title>
    <meta name="description" content="PicUntu 是一款免费开源的在线图片压缩工具，支持 JPEG、PNG、WEBP、AVIF、SVG、GIF 格式智能压缩，纯本地处理保护隐私，批量压缩高效便捷。" />
    <meta name="keywords" content="图片压缩,在线压缩,批量压缩,PicUntu,JPEG压缩,PNG压缩,WEBP压缩,图片优化,开源工具" />
    <meta property="og:title" content="PicUntu – 智能批量图片压缩工具" />
    <meta property="og:description" content="免费开源的在线图片压缩工具，支持多格式智能压缩，纯本地处理保护隐私。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tttai.eu.cc" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://tttai.eu.cc" />
    <style>
      /* ===== 极简科技风 Splash Screen - Golden ===== */
      :root { --gold: #C5960B; --gold-light: rgba(197,150,11,0.5); }
      body { margin: 0; background: #0f0e0a; }
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a08;
        font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash-decor {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .splash-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(197,150,11,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(197,150,11,0.04) 1px, transparent 1px);
        background-size: 60px 60px;
        animation: gridPulse 4s ease-in-out infinite;
      }
      @keyframes gridPulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
      .splash-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 400px;
        height: 400px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(197,150,11,0.08) 0%, transparent 70%);
        animation: glowBreath 3s ease-in-out infinite;
      }
      @keyframes glowBreath {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
        50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
      }
      .splash-core {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }
      .splash-logo {
        font-size: 28px;
        font-weight: 700;
        color: #C5960B;
        letter-spacing: 2px;
        text-shadow: 0 0 30px rgba(197,150,11,0.4);
        animation: logoBeat 2s ease-in-out infinite;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .splash-logo svg {
        width: 32px;
        height: 32px;
      }
      @keyframes logoBeat {
        0%, 100% { text-shadow: 0 0 30px rgba(197,150,11,0.4); }
        50% { text-shadow: 0 0 50px rgba(197,150,11,0.7); }
      }
      .splash-stages {
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-width: 280px;
      }
      .splash-stage {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        color: rgba(255,255,255,0.25);
        letter-spacing: 0.5px;
        transition: color 0.5s ease;
      }
      .splash-stage.active {
        color: rgba(255,255,255,0.9);
      }
      .splash-stage.done {
        color: #C5960B;
      }
      .splash-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
        background: rgba(255,255,255,0.15);
        transition: all 0.5s ease;
      }
      .splash-stage.active .splash-dot {
        background: #C5960B;
        box-shadow: 0 0 8px rgba(197,150,11,0.6);
        animation: dotPulse 1.2s ease-in-out infinite;
      }
      .splash-stage.done .splash-dot {
        background: #C5960B;
        box-shadow: 0 0 4px rgba(197,150,11,0.3);
      }
      @keyframes dotPulse {
        0%, 100% { box-shadow: 0 0 6px rgba(197,150,11,0.4); }
        50% { box-shadow: 0 0 14px rgba(197,150,11,0.8); }
      }
      .splash-done-icon {
        opacity: 0;
        transform: scale(0);
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        font-size: 12px;
        color: #C5960B;
        display: inline-flex;
      }
      .splash-stage.done .splash-done-icon {
        opacity: 1;
        transform: scale(1);
      }
      .splash-progress-bar {
        position: absolute;
        bottom: 48px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 1px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
      }
      .splash-progress-fill {
        height: 100%;
        background: #C5960B;
        width: 0%;
        transition: width 0.4s ease;
      }
      @media (max-width: 480px) {
        .splash-stages { min-width: 240px; gap: 12px; }
        .splash-stage { font-size: 12px; }
        .splash-core { gap: 24px; }
        .splash-logo { font-size: 22px; }
        .splash-logo svg { width: 26px; height: 26px; }
        .splash-progress-bar { width: 160px; bottom: 36px; }
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash-screen">
      <div class="splash-decor">
        <div class="splash-grid"></div>
        <div class="splash-glow"></div>
      </div>
      <div class="splash-core">
        <div class="splash-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#C5960B" stroke-width="1.5">
            <rect x="3" y="2" width="18" height="20" rx="2"/>
            <circle cx="12" cy="9" r="4"/>
            <path d="M8 17c0-2.2 1.8-4 4-4s4 1.8 4 4"/>
          </svg>
          PicUntu
        </div>
        <div class="splash-stages">
          <div class="splash-stage" id="stage-1">
            <span class="splash-dot"></span>
            <span class="splash-label">
              系统初始化
              <span class="splash-done-icon">&#10003;</span>
            </span>
          </div>
          <div class="splash-stage" id="stage-2">
            <span class="splash-dot"></span>
            <span class="splash-label">
              资源加载中
              <span class="splash-done-icon">&#10003;</span>
            </span>
          </div>
          <div class="splash-stage" id="stage-3">
            <span class="splash-dot"></span>
            <span class="splash-label">
              构建页面
              <span class="splash-done-icon">&#10003;</span>
            </span>
          </div>
        </div>
      </div>
      <div class="splash-progress-bar">
        <div class="splash-progress-fill" id="splash-progress-fill"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      (function() {
        var stages = [
          { el: document.getElementById('stage-1'), delay: 300 },
          { el: document.getElementById('stage-2'), delay: 800 },
          { el: document.getElementById('stage-3'), delay: 1400 }
        ];
        var progressBar = document.getElementById('splash-progress-fill');
        var splashScreen = document.getElementById('splash-screen');

        function activateStage(index) {
          if (index >= stages.length) return;
          var stage = stages[index];
          stage.el.classList.add('active');
          progressBar.style.width = ((index + 1) / stages.length * 100) + '%';

          setTimeout(function() {
            stage.el.classList.remove('active');
            stage.el.classList.add('done');
            if (index + 1 < stages.length) {
              activateStage(index + 1);
            } else {
              setTimeout(function() {
                splashScreen.classList.add('hidden');
                setTimeout(function() {
                  if (splashScreen.parentNode) {
                    splashScreen.parentNode.removeChild(splashScreen);
                  }
                }, 600);
              }, 400);
            }
          }, 600 + Math.random() * 300);
        }

        activateStage(0);
      })();
    </script>
  </body>
</html>
