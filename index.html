<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PicUntu – 智能批量图片压缩工具 | 支持 JPEG PNG WEBP AVIF SVG GIF</title>
    <meta name="description" content="PicUntu 是一款免费开源的在线图片压缩工具，支持 JPEG、PNG、WEBP、AVIF、SVG、GIF 格式智能压缩，纯本地处理保护隐私，批量压缩高效便捷。" />
    <meta name="keywords" content="图片压缩,在线压缩,批量压缩,PicUntu,JPEG压缩,PNG压缩,WEBP压缩,图片优化,开源工具" />
    <meta property="og:title" content="PicUntu – 智能批量图片压缩工具" />
    <meta property="og:description" content="免费开源的在线图片压缩工具，支持多格式智能压缩，纯本地处理保护隐私。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tttai.eu.cc" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://tttai.eu.cc" />
    <style>
      /* ===== 元宇宙虚拟空间 Splash Screen ===== */
      :root { --cyan: #4a90c4; --cyan-light: rgba(74,144,196,0.4); }
      body { margin: 0; background: #f8fafc; }
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash-decor {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .splash-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(100,160,200,0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(100,160,200,0.05) 1px, transparent 1px);
        background-size: 60px 60px;
        animation: gridPulse 4s ease-in-out infinite;
      }
      @keyframes gridPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      .splash-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(74,144,196,0.06) 0%, transparent 70%);
        transform: translate(-50%, -50%) scale(1);
        animation: glowBreathe 3s ease-in-out infinite;
      }
      @keyframes glowBreathe {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
        50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      }
      .splash-geo {
        position: absolute;
        border: 0.5px solid rgba(100,160,200,0.12);
        pointer-events: none;
      }
      .splash-geo-1 {
        top: 15%;
        right: 10%;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        animation: geoFloat1 5s ease-in-out infinite;
      }
      .splash-geo-2 {
        bottom: 20%;
        left: 8%;
        width: 80px;
        height: 80px;
        border-radius: 8px;
        transform: rotate(30deg);
        animation: geoFloat2 4.5s ease-in-out infinite;
      }
      @keyframes geoFloat1 {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-10px) scale(1.05); }
      }
      @keyframes geoFloat2 {
        0%, 100% { transform: translateY(0) rotate(30deg); }
        50% { transform: translateY(-8px) rotate(35deg); }
      }
      .splash-content {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .splash-logo {
        font-size: 36px;
        font-weight: 700;
        color: #4a90c4;
        letter-spacing: 3px;
        margin-bottom: 20px;
      }
      .splash-stages {
        display: flex;
        gap: 24px;
        margin-top: 32px;
        align-items: center;
      }
      .splash-stage {
        font-size: 12px;
        color: rgba(70,130,160,0.4);
        letter-spacing: 1px;
        transition: all 0.4s ease;
      }
      .splash-stage.active {
        color: #4a90c4;
        text-shadow: 0 0 20px rgba(74,144,196,0.3);
      }
      .splash-stage.done {
        color: rgba(74,144,196,0.5);
      }
      .splash-sep {
        width: 24px;
        height: 0.5px;
        background: rgba(100,160,200,0.15);
      }
      .splash-bar {
        width: 200px;
        height: 1px;
        background: rgba(100,160,200,0.08);
        margin-top: 16px;
        border-radius: 1px;
        overflow: hidden;
      }
      .splash-bar-fill {
        height: 100%;
        background: #4a90c4;
        border-radius: 1px;
        transition: width 0.5s ease;
        width: 0%;
        box-shadow: 0 0 8px rgba(74,144,196,0.3);
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash-screen">
      <div class="splash-decor">
        <div class="splash-grid"></div>
        <div class="splash-glow"></div>
      </div>
      <div class="splash-core">
        <div class="splash-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#C5960B" stroke-width="1.5">
            <rect x="3" y="2" width="18" height="20" rx="2"/>
            <circle cx="12" cy="9" r="4"/>
            <path d="M8 17c0-2.2 1.8-4 4-4s4 1.8 4 4"/>
          </svg>
          PicUntu
        </div>
        <div class="splash-stages">
          <div class="splash-stage" id="stage-1">
            <span class="splash-dot"></span>
            <span class="splash-label">
              系统初始化
              <span class="splash-done-icon">&#10003;</span>
            </span>
          </div>
          <div class="splash-stage" id="stage-2">
            <span class="splash-dot"></span>
            <span class="splash-label">
              资源加载中
              <span class="splash-done-icon">&#10003;</span>
            </span>
          </div>
          <div class="splash-stage" id="stage-3">
            <span class="splash-dot"></span>
            <span class="splash-label">
              构建页面
              <span class="splash-done-icon">&#10003;</span>
            </span>
          </div>
        </div>
      </div>
      <div class="splash-progress-bar">
        <div class="splash-progress-fill" id="splash-progress-fill"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      (function() {
        var stages = [
          { el: document.getElementById('stage-1'), delay: 300 },
          { el: document.getElementById('stage-2'), delay: 800 },
          { el: document.getElementById('stage-3'), delay: 1400 }
        ];
        var progressBar = document.getElementById('splash-progress-fill');
        var splashScreen = document.getElementById('splash-screen');

        function activateStage(index) {
          if (index >= stages.length) return;
          var stage = stages[index];
          stage.el.classList.add('active');
          progressBar.style.width = ((index + 1) / stages.length * 100) + '%';

          setTimeout(function() {
            stage.el.classList.remove('active');
            stage.el.classList.add('done');
            if (index + 1 < stages.length) {
              activateStage(index + 1);
            } else {
              setTimeout(function() {
                splashScreen.classList.add('hidden');
                setTimeout(function() {
                  if (splashScreen.parentNode) {
                    splashScreen.parentNode.removeChild(splashScreen);
                  }
                }, 600);
              }, 400);
            }
          }, 600 + Math.random() * 300);
        }

        activateStage(0);
      })();
    </script>
  </body>
</html>
