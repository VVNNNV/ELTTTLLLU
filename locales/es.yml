about:
  content: >
    # Acerca de IT-Tools

    IT-Tools es una colección de herramientas útiles creadas con ❤️ por [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about),
    pensadas para desarrolladores y profesionales del sector tecnológico.
    Si te resultan útiles, compártelas y guarda el sitio en tus favoritos.

    IT-Tools es software libre y open source (licencia GPL-3.0), completamente gratuito y lo seguirá siendo.
    Sin embargo, los gastos de hosting y dominio son constantes.
    Si deseas apoyar mi trabajo y motivarme para seguir añadiendo herramientas,
    puedes hacerlo a través de [mi página de apoyo](https://www.buymeacoffee.com/cthmsst).

    ## Tecnologías
    IT-Tools está desarrollado con Vue.js 3 y la librería de componentes Naive UI,
    alojado y desplegado de forma continua en Vercel.
    Algunas herramientas utilizan librerías externas;
    la lista completa se encuentra en el archivo [package.json](https://github.com/CorentinTh/it-tools/blob/main/package.json).

    ## ¿Has encontrado un error? ¿Echas en falta una herramienta?
    Si necesitas una herramienta que no está disponible, puedes proponerla en la
    [sección de issues](https://github.com/CorentinTh/it-tools/issues/new/choose) de GitHub.

    Si detectas un fallo o un mal funcionamiento, abre un reporte de error en la misma sección.

