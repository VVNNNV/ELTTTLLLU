about:
  content: >
    # About IT-Tools

    Built with ❤️ by [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about),
    IT-Tools brings together a curated set of practical utilities for developers and IT professionals.
    If you find it helpful, feel free to share it and bookmark it for quick access!

    IT-Tools is fully open-source (GPL-3.0 license) and free, and will always remain free.
    However, hosting and domain renewal involve ongoing costs.
    If you’d like to support my work and help me add more tools,
    you can do so by [sponsoring me](https://www.buymeacoffee.com/cthmsst).

    ## Technologies
    IT-Tools is developed with Vue.js 3 and the Naive UI component library,
    hosted and continuously deployed on Vercel.
    Several third‑party open‑source libraries are used across the tools;
    you can find the full list in the project’s [package.json](https://github.com/CorentinTh/it-tools/blob/main/package.json).

    ## Found a bug? Missing a tool?
    If you need a tool that isn’t yet available and believe it would benefit others,
    you can submit a feature request in the [issues section](https://github.com/CorentinTh/it-tools/issues/new/choose) on GitHub.

    If you encounter a bug or unexpected behavior,
    please report it in the same issues section to help improve the platform.

