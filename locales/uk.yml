about:
  content: >
    # О IT-Tools

    IT-Tools создан разработчиком [Corentin Thomasset](https://corentin.tech) с любовью. Это набор полезных инструментов для разработчиков и IT-специалистов.
    Если программа вам помогла, поделитесь с друзьями и добавьте в закладки!

    IT-Tools абсолютно бесплатен и имеет открытый исходный код (лицензия GPL-3.0), но требует средств на хостинг и оплату домена.
    Если вы хотите поддержать мой труд и помочь добавить новые инструменты — поддержите меня.

    ## Технологии
    IT-Tools разработан на Vue 3 + Naive UI, хостинг — Vercel.
    Полный список библиотек в файле package.json.

    ## Найден баг? Не хватает инструмента?
    Предложите новые функции или сообщите об ошибках в Issues на GitHub.

