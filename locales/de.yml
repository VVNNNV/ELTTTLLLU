about:
  content: >
    # Über IT-Tools

    IT-Tools wurde mit ❤️ von [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about) entwickelt.
    Es bietet nützliche Werkzeuge für Entwickler und IT-Fachkräfte.
    Wenn dir das Tool hilft, teile es gerne weiter und speichere es als Lesezeichen!

    IT-Tools ist Open Source (GPL-3.0-Lizenz) und kostenlos – und bleibt es immer.
    Allerdings entstehen Kosten für Hosting und Domain.
    Wenn du meine Arbeit unterstützen und neue Tools fördern möchtest,
    kannst du mich gerne [sponsorn](https://www.buymeacoffee.com/cthmsst).

    ## Technologien
    IT-Tools basiert auf Vue.js 3 und Naive UI.
    Gehostet und bereitgestellt wird es von Vercel.
    Eine vollständige Liste der genutzten Bibliotheken findest du in der
    [package.json](https://github.com/CorentinTh/it-tools/blob/main/package.json).

    ## Fehler gefunden? Fehlt ein Tool?
    Wenn du ein Tool vermisst oder einen Fehler entdeckst,
    erstelle bitte einen Eintrag im
    [Issue-Bereich](https://github.com/CorentinTh/it-tools/issues/new/choose) auf GitHub.

