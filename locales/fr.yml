about:
  content: >
    # À propos d’IT-Tools

    Développé avec ❤️ par [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about),
    IT-Tools rassemble une collection d’outils pratiques pour les développeurs et les professionnels de l’informatique.
    Si ce projet vous est utile, n’hésitez pas à le partager et à l’ajouter à vos favoris !

    IT-Tools est gratuit, open‑source (licence GPL‑3.0) et le restera toujours.
    Cependant, l’hébergement et les noms de domaine entraînent des frais récurrents.
    Si vous souhaitez soutenir mon travail et encourager l’ajout de nouveaux outils,
    vous pouvez [me soutenir ici](https://www.buymeacoffee.com/cthmsst).

    ## Technologies
    IT-Tools est développé avec Vue.js 3 et la bibliothèque de composants Naive UI.
    L’hébergement et le déploiement continu sont assurés par Vercel.
    La liste complète des bibliothèques open‑source utilisées est disponible dans le fichier
    [package.json](https://github.com/CorentinTh/it-tools/blob/main/package.json).

    ## Un bug ? Un outil manquant ?
    Si vous avez besoin d’un outil qui n’est pas encore présent,
    vous pouvez soumettre une demande dans la
    [section des issues](https://github.com/CorentinTh/it-tools/issues/new/choose) du dépôt GitHub.

    Si vous rencontrez un bug ou un dysfonctionnement,
    n’hésitez pas à créer un rapport d’erreur dans la même section.

