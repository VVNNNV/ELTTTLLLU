about:
  content: >
    # 关于 IT-Tools

    IT-Tools 由 [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about) 开发，专为开发者与 IT 从业者打造的实用工具集。
    如果对你有帮助，欢迎分享给朋友并加入收藏！

    IT-Tools 永久免费、完全开源（GPL-3.0 协议），服务器与域名需要持续维护。
    如果你认可本项目，希望支持作者开发更多工具，欢迎通过 [赞助链接](https://www.buymeacoffee.com/cthmsst) 支持。

    ## 技术栈
    基于 Vue 3 + Naive UI 构建，由 Vercel 提供托管与持续部署服务。
    项目依赖众多优秀开源库，完整列表可查看仓库中的 [package.json](https://github.com/CorentinTh/it-tools/blob/main/package.json)。

    ## 反馈与建议
    缺少你需要的工具？欢迎在 GitHub [提交功能建议](https://github.com/CorentinTh/it-tools/issues/new/choose)。
    发现 Bug 或使用异常？欢迎在 GitHub [提交问题反馈](https://github.com/CorentinTh/it-tools/issues/new/choose)。

