about:
  content: >
    # Om IT-Tools

    IT-Tools er laget med ❤️ av [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about)
    og samler nyttige verktøy for utviklere og IT-fagfolk.
    Hvis du synes nettstedet er nyttig, del det gjerne med andre og lagre det som bokmerke!

    IT-Tools er åpen kildekode (GPL-3.0-lisens), helt gratis og vil alltid være det.
    Men drift og domenefornyelser koster penger.
    Hvis du vil støtte arbeidet mitt og motivere meg til å legge til flere verktøy,
    kan du [støtte meg her](https://www.buymeacoffee.com/cthmsst).

    ## Teknologi
    IT-Tools er bygget med Vue.js 3 og Naive UI-komponentbiblioteket,
    og hostes av Vercel. Tredjepartsbiblioteker brukes i enkelte verktøy;
    full oversikt finnes i [package.json](https://github.com/CorentinTh/it-tools/blob/main/package.json).

    ## Funnet en feil? Savner du et verktøy?
    Hvis du trenger et verktøy som ikke finnes her, kan du foreslå funksjoner i
    [issue-seksjonen](https://github.com/CorentinTh/it-tools/issues/new/choose) på GitHub.

    Hvis du finner feil eller uventet oppførsel, vennligst send en feilrapport der også.

