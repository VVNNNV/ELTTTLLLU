about:
  content: >
    # Về IT-Tools

    IT-Tools được phát triển bởi [Corentin Thomasset](https://corentin.tech) với tình yêu,
    tập hợp các công cụ hữu ích cho nhà phát triển và người làm việc IT.
    Nếu hữu ích, hãy chia sẻ cho bạn bè và lưu vào bookmark!

    IT-Tools hoàn toàn miễn phí và mã nguồn mở (giấy phép GPL-3.0),
    nhưng cần chi phí cho máy chủ và tên miền.
    Nếu bạn muốn hỗ trợ công việc của tôi, hãy cân nhắc [Ủng hộ tôi](https://www.buymeacoffee.com/cthmsst).

    ## Công nghệ
    IT-Tools được xây dựng bằng Vue.js (Vue 3) và thư viện Naive UI,
    được lưu trữ bởi Vercel.
    Danh sách thư viện đầy đủ có trong tệp package.json.

    ## Phát hiện lỗi? Thiếu công cụ?
    Nếu chưa có công cụ bạn cần, hãy tạo yêu cầu trên GitHub Issues.
    Nếu phát hiện lỗi, hãy báo cáo để chúng tôi cải thiện sớm.

