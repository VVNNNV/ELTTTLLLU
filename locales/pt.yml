about:
  content: >
    # Về IT-Tools

    Dự án được phát triển với tình yêu bởi [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about),
    tập hợp các công cụ hữu ích cho lập trình viên và người làm việc trong lĩnh vực CNTT.
    Nếu bạn thấy trang hữu ích, hãy chia sẻ cho người khác và lưu vào bookmark nhé!

    IT-Tools là mã nguồn mở (theo giấy phép GPL-3.0), hoàn toàn miễn phí và sẽ luôn như vậy.
    Tuy nhiên, việc duy trì máy chủ và tên miền cần chi phí.
    Nếu bạn muốn hỗ trợ công việc của tôi và khuyến khích thêm công cụ mới,
    hãy cân nhắc [hỗ trợ tôi](https://www.buymeacoffee.com/cthmsst).

    ## Công nghệ
    IT-Tools được xây dựng trên Vue.js (Vue 3) cùng thư viện component Naive UI,
    được lưu trữ bởi Vercel.
    Một số công cụ sử dụng thư viện mã nguồn mở bên thứ ba,
    danh sách đầy đủ có thể xem trong tệp [package.json](https://github.com/CorentinTh/it-tools/blob/main/package.json).

    ## Phát hiện lỗi? Thiếu công cụ?
    Nếu bạn cần một công cụ chưa có và nghĩ nó sẽ hữu ích,
    hãy tạo yêu cầu trong [phần Issues](https://github.com/CorentinTh/it-tools/issues/new/choose) trên GitHub.

    Nếu bạn tìm thấy lỗi hoặc chức năng hoạt động không đúng,
    vui lòng báo cáo trong [Issues](https://github.com/CorentinTh/it-tools/issues/new/choose) để chúng tôi cải thiện sớm.

